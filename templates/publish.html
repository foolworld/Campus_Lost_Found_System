{% extends "base.html" %}

{% block title %}发布信息 - 校园失物招领{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white">
                <h4><i class="fas fa-plus-circle"></i> 发布拾物信息</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('publish') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label">标题</label>
                        <input type="text" class="form-control" id="title" name="title" placeholder="请输入物品名称" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">详细描述</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="请详细描述物品特征..." required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="pickup_time" class="form-label">拾取时间</label>
                        <input type="datetime-local" class="form-control" id="pickup_time" name="pickup_time" required>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">拾取地点</label>
                        <input type="text" class="form-control" id="location" name="location" placeholder="请输入拾取地点" required>
                    </div>
                    <div class="mb-3">
                        <label for="place_location" class="form-label">放置地点</label>
                        <input type="text" class="form-control" id="place_location" name="place_location" placeholder="请输入放置地点（失主可前往领取）" required>
                    </div>
                    <div class="mb-3">
                        <label for="image" class="form-label">图片（可选）</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                        <small class="text-muted">支持 JPG、PNG 格式，文件大小不超过 5MB</small>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> 发布
                    </button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary ms-2">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
