{% extends "base.html" %}

{% block title %}公告 - 校园失物招领{% endblock %}

{% block content %}
<h2>公告通知</h2>

{% if notices %}
<div class="list-group">
    {% for notice in notices %}
    <div class="card mb-3">
        <div class="card-header bg-primary text-white">
            <h5>{{ notice.title }}</h5>
        </div>
        <div class="card-body">
            <p class="card-text">{{ notice.content }}</p>
            <small class="text-muted">{{ notice.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="col-12 text-center py-8">
    <i class="fas fa-bullhorn fa-5x text-muted mb-3"></i>
    <p class="text-muted">暂无公告</p>
</div>
{% endif %}
{% endblock %}
