{% extends "base.html" %}

{% block title %}系统公告 - 校园失物招领{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg">
            <div class="card-header bg-info text-white">
                <h4><i class="fas fa-bullhorn"></i> 系统公告</h4>
            </div>
            <div class="card-body">
                {% if notices %}
                <div class="space-y-4">
                    {% for notice in notices %}
                    <div class="card border-left-info">
                        <div class="card-header bg-light">
                            <h5 class="text-info">{{ notice.title }}</h5>
                            <small class="text-muted">{{ notice.created_at }}</small>
                        </div>
                        <div class="card-body">
                            <p>{{ notice.content }}</p>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                {% else %}
                <div class="text-center py-8">
                    <i class="fas fa-bullhorn fa-5x text-muted mb-3"></i>
                    <p class="text-muted">暂无公告</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
