{% extends "base.html" %}

{% block title %}编辑信息 - 校园失物招领{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg">
            <div class="card-header bg-warning text-white">
                <h4><i class="fas fa-edit"></i> 编辑拾物信息</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_post', post_id=post.id) }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label">标题</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ post.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">详细描述</label>
                        <textarea class="form-control" id="description" name="description" rows="4" required>{{ post.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="pickup_time" class="form-label">拾取时间</label>
                        <input type="datetime-local" class="form-control" id="pickup_time" name="pickup_time" value="{{ post.pickup_time }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">拾取地点</label>
                        <input type="text" class="form-control" id="location" name="location" value="{{ post.location }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="place_location" class="form-label">放置地点</label>
                        <input type="text" class="form-control" id="place_location" name="place_location" value="{{ post.place_location }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="image" class="form-label">图片（可选）</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                        {% if post.image %}
                        <small class="text-muted">当前图片：{{ post.image }}</small>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> 保存修改
                    </button>
                    <a href="{{ url_for('post_detail', post_id=post.id) }}" class="btn btn-secondary ms-2">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
